    const maxLabels = Math.min(25, Math.max(5, Math.ceil(sortedDeg.length * 0.15)));
    const labelCutoff = sortedDeg.length ? sortedDeg[Math.min(maxLabels - 1, sortedDeg.length - 1)] : 0;
    const sourceSet = new Set(filteredLinks.map(l => l.source));
    const destSet   = new Set(filteredLinks.map(l => l.target));

    const nodes = filteredEntries.map(d => {
      // Helper to get node color based on category or default
      const getNodeColor = (nodeId) => {
        if (useColorByCategory && nodeMostCommonCat.has(nodeId)) {
          const catMap = nodeMostCommonCat.get(nodeId);
          const mostCommonCat = [...catMap.entries()].sort((a, b) => b[1] - a[1])[0][0];
          return catColor.get(mostCommonCat) || GROUP_COLOR_TWIN;
        }
        return GROUP_COLOR_TWIN;
      };
      
      if (d.kind === 'group') {
        const grp = d.info;
        const totalConns = groupConns.get(d.gid) || grp.members.length;
        const sz = Math.max(28, Math.min(80, 16 + Math.sqrt(totalConns) * 4)) * nodeSizeScale;
        const isL1 = grp.level === 1;
        const gpos = posStore.get(d.gid);
        const gc = grp.color || '#2E9CDB';
        return {
          id: d.gid,
          name: `L${grp.level} ${grp.displayLabel}`,
          symbol: 'circle',
          symbolSize: sz,
          ...(gpos ? { x: gpos.x, y: gpos.y } : {}),
          // Solid filled circle: groups are visually prominent, leaves are hollow.
          // Border thickness signals depth — L1 thicker than L2.
          itemStyle: { color: gc, borderColor: '#ffffff', borderWidth: isL1 ? 2 : 1, opacity: nodeOpacity },
          label: {
            show: true, position: 'inside',
            formatter: `{lv|L${grp.level}}\n{nm|${grp.displayLabel}}\n{ct|(${grp.members.length})}`,
            rich: {
              lv: { fontSize: nodeLabelFontSize + 4, fontWeight: 'bold', color: '#ffffff',
                    textBorderColor: gc, textBorderWidth: 1, lineHeight: nodeLabelFontSize + 7,
                    align: 'center' },
              nm: { fontSize: nodeLabelFontSize, fontWeight: 'bold', color: '#ffffff',
                    textBorderColor: gc, textBorderWidth: 1 },
              ct: { fontSize: nodeLabelFontSize, color: 'rgba(255,255,255,0.85)',
                    textBorderColor: gc, textBorderWidth: 1, align: 'center',
                    lineHeight: nodeLabelFontSize + 4 },
            },
          },
          _isGroup: true, _gid: d.gid,
        };
      }
      const n = d.node;
      const id = n.id;
      const deg = degree.get(id) || 1;
      const szBase = n.size || (n.value != null
        ? Math.max(16, Math.min(72, Math.sqrt(n.value) * 4))
        : Math.max(10, Math.min(56, 8 + Math.sqrt(deg) * 4)));
      const sz = szBase * nodeSizeScale;
      const role = (sourceSet.has(id) && destSet.has(id)) ? 'both' : sourceSet.has(id) ? 'source' : 'dest';
      const l1gid = idToL1Gid.get(id);
      const communityColor = l1gid ? l1Colors.get(l1gid) : null;
      // Find deepest expanded group containing this node
      let groupGid = null;
      for (let lvl = levels.length - 1; lvl >= 0; lvl--) {
        const gid = levels[lvl]?.get(id);
        if (gid && gInfo.get(gid)?.expanded) { groupGid = gid; break; }
      }
      const inGroup = groupGid != null;
      const leafColor = useColorByCategory ? getNodeColor(id) : (n.color || communityColor || ROLE_COLOR[role]);
      const storedPos = posStore.get(id);
      return {
        id,
        name: n.name || id,
        symbolSize: sz,
        ...(storedPos ? { x: storedPos.x, y: storedPos.y } : {}),
        itemStyle: {
          color: leafFillWhite ? '#ffffff' : 'transparent',
          borderColor: leafColor,
          borderWidth: inGroup ? 2.5 : 1.5,
          opacity: nodeOpacity,
        },
        label: {
          show: !(groupGid && gInfo.get(groupGid)?.kind === 'twin' && !showTwinLabels) && (deg >= labelCutoff || inGroup),
          position: 'inside',
          fontSize: nodeLabelFontSize,
          color: leafColor,
          textBorderColor: '#ffffff',
          textBorderWidth: 2,
          fontWeight: inGroup ? 'bold' : 'normal',
        },
        _inGroup: inGroup,
        _groupGid: groupGid,
      };
    });

    const linkValues = filteredLinks.map(l => l.value).filter(v => v != null && v > 0);
    const minLV = linkValues.length ? Math.min(...linkValues) : 1;
    const maxLV = linkValues.length ? Math.max(...linkValues) : 1;
    const scaleWidth = v => (v != null && maxLV > minLV)
      ? 1 + ((v - minLV) / (maxLV - minLV)) * 5
      : (v != null ? 2 : 1);
    const echLinks = filteredLinks.map(l => {
      const w = scaleWidth(l.value);
      return {
        source: l.source, target: l.target,
        name: l.label != null ? String(l.label) + (l.count > 1 ? ' ×' + l.count : '') : undefined,
        value: l.value,
        label: { show: false, formatter: l.label != null ? String(l.label) : '', fontSize: edgeLabelFontSize, color: t.text },
        emphasis: { label: { show: l.label != null, color: t.text } },
        symbolSize: [0, Math.max(arrowheadMinSize, Math.min(25, w * 3.5))],
        lineStyle: { width: w, opacity: edgeOpacity * 0.75, color: useColorEdgesByCategory ? (l.color || (l.label ? catColor.get(l.label) : null) || null) : '#000000' },
      };
    });

    const option = {
      backgroundColor: '#ffffff',
      color: CHART_COLORS,
      title: titleOpt,
      tooltip: {
        formatter: p => {
          if (p.dataType === 'edge') {
            return p.data.name ? p.data.name + (p.data.value != null ? ' (' + p.data.value + ')' : '')
              : p.data.source + (directed ? ' → ' : ' — ') + p.data.target;
          }
          if (p.data._isGroup) {
            const info = gInfo.get(p.data._gid);
            const list = info.members.slice(0, 8).join(', ') + (info.members.length > 8 ? ', …' : '');
            const kindLabel = info.kind === 'attribute'
              ? (info.level === 1 ? 'Attribute group (L1)' : `Attribute sub-group (L${info.level})`)
              : info.kind === 'louvain' ? 'Louvain community'
              : 'Twin sub-group';
            return '<b>' + p.name + '</b><br/><i>' + kindLabel + '</i><br/>' + list + '<br/><i>click to expand</i>';
          }
          return p.name + (p.data._inGroup ? '<br/><i>click to collapse group</i>' : '');
        },
      },
      legend: { show: false },
      series: [{
        id: 'graph-main',
        type: 'graph',
        layout: 'none',
        data: nodes,
        links: echLinks,
        roam: true,
        label: { show: false },
        edgeLabel: { show: false, fontSize: 10 },
        edgeSymbol: (directed && showArrowheads) ? ['none', 'arrow'] : ['none', 'none'],
        lineStyle: { curveness: spec.curved ? 0.2 : 0 },
        emphasis: { focus: 'adjacency', lineStyle: { width: 4 }, edgeLabel: { show: true, fontSize: 10 } },
      }],
    };
    ec.setOption(option, { replaceMerge: ['series'] });
  }

  updateMethodButtons();
  rerender();

  // Flag set synchronously by the ECharts node-click handler so the hull
  // click handler below knows to skip hull hit-testing for that click.
  let ecClickHandled = false;

  ec.on('click', params => {
    if (params.dataType !== 'node') return;
    const d = params.data;
    if (!d) return;
    ecClickHandled = true;
    if (d._isGroup) {
      const grp = gInfo.get(d._gid);
      grp.savedPos = posStore.get(d._gid);
      grp.expanded = true;
      rerender();
    } else if (d._inGroup) { gInfo.get(d._groupGid).expanded = false; rerender(); }
  });

  // Click anywhere on a hull's background area (not on a node) to collapse that group.
  chartDiv.addEventListener('click', e => {
    if (ecClickHandled) { ecClickHandled = false; return; }
    const rect = chartDiv.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    // Check in reverse draw order so inner (L2) hulls are tested first.
    for (let i = hullPolys.length - 1; i >= 0; i--) {
      const { gid, poly, circle } = hullPolys[i];
      const hit = poly
        ? d3.polygonContains(poly, [x, y])
        : (circle && (x - circle.cx) ** 2 + (y - circle.cy) ** 2 <= circle.r ** 2);
      if (hit) {
        const g = gInfo.get(gid);
        if (g) { g.expanded = false; rerender(); return; }
      }
    }
  });

  window.addEventListener('resize', () => ec.resize());
}

// ── Plotly renderer ─────────────────────────────────────────────────────────
function renderPlotly(wrap, spec) {
  if (!wrap.style.height) wrap.style.height = '420px';
  wrap._chartSpec = spec;
  const t = getThemeColors();
  const layout = {
    paper_bgcolor: '#ffffff',
    plot_bgcolor:  '#ffffff',
    font: { family: 'Segoe UI, system-ui, -apple-system, sans-serif', color: t.text, size: 12 },
    margin: { t: spec.title ? 44 : 20, r: 20, b: 60, l: 70 },
    showlegend: true,
    legend: { font: { color: t.text, size: 11 } },
    xaxis: { gridcolor: t.grid, tickfont: { color: t.text2, size: 11 }, linecolor: t.grid, zerolinecolor: t.grid },
    yaxis: { gridcolor: t.grid, tickfont: { color: t.text2, size: 11 }, linecolor: t.grid, zerolinecolor: t.grid },
  };
  if (spec.title)  layout.title  = { text: spec.title,  font: { color: t.text,  size: 13 }, x: 0.5 };
  if (spec.xLabel) layout.xaxis.title = { text: spec.xLabel, font: { color: t.text2, size: 11 } };
  if (spec.yLabel) layout.yaxis.title = { text: spec.yLabel, font: { color: t.text2, size: 11 } };
  let traces = [];

  switch (spec.type) {
    case 'box': {
      traces = (spec.data || []).map((d, i) => ({
        type: 'box',
        name: d.label || d.name || ('Series ' + (i + 1)),
        y: d.values || [],
        marker: { color: CHART_COLORS[i % CHART_COLORS.length] },
        line:   { color: CHART_COLORS[i % CHART_COLORS.length] },
        boxpoints: 'outliers',
        jitter: 0.3,
      }));
      break;
    }
    case 'violin': {
      traces = (spec.data || []).map((d, i) => ({
        type: 'violin',
        name: d.label || d.name || ('Series ' + (i + 1)),
        y: d.values || [],
        marker:    { color: CHART_COLORS[i % CHART_COLORS.length] },
        line:      { color: CHART_COLORS[i % CHART_COLORS.length] },
        fillcolor: CHART_COLORS[i % CHART_COLORS.length] + '44',
        box:       { visible: true },
        meanline:  { visible: true },
        points:    'outliers',
      }));
      break;
    }
    case 'waterfall': {
      const vals = spec.values || [];
      traces = [{
        type: 'waterfall',
        x: spec.labels || [],
        y: vals,
        measure: spec.measure || vals.map((_, i) => i === 0 ? 'absolute' : 'relative'),
        connector:  { line: { color: 'rgba(0,0,0,0.2)' } },
        increasing: { marker: { color: CHART_COLORS[0] } },
        decreasing: { marker: { color: '#E85858' } },
        totals:     { marker: { color: '#888888' } },
        text: vals.map(v => (v > 0 ? '+' : '') + (typeof v === 'number' ? v.toLocaleString() : v)),
        textposition: 'outside',
      }];
      break;
    }
    case 'candlestick': {
      const rows = spec.data || [];
      traces = [{
        type:  'candlestick',
        x:     rows.map(d => d.x || d.date || d.period),
        open:  rows.map(d => d.open),
        high:  rows.map(d => d.high),
        low:   rows.map(d => d.low),
        close: rows.map(d => d.close),
        increasing: { line: { color: CHART_COLORS[0] } },
        decreasing: { line: { color: '#E85858' } },
      }];
      layout.xaxis.type = 'category';
      layout.xaxis.rangeslider = { visible: false };
      break;
    }
  }

  Plotly.newPlot(wrap, traces, layout, { responsive: true, displayModeBar: false });
  window.addEventListener('resize', () => { try { Plotly.relayout(wrap, {}); } catch (_) {} });
}

// ── ApexCharts renderer ──────────────────────────────────────────────────────
function renderApexCharts(wrap, spec) {
  if (!wrap.style.height) {
    if (spec.type === 'timeline') {
      const labels = new Set();
      (spec.data || []).forEach(d => labels.add(d.label || d.name || ''));
      const rowCount = Math.max(1, labels.size);
      wrap.style.height = Math.min(10000, Math.max(360, rowCount * 30 + 120)) + 'px';
    } else {
      wrap.style.height = '420px';
    }
  }
  wrap._chartSpec = spec;
  const t = getThemeColors();

  const baseChart = {
    background: '#ffffff',
    toolbar: { show: false },
    fontFamily: 'Segoe UI, system-ui, -apple-system, sans-serif',
    foreColor: t.text,
  };
  const titleOpt = { text: spec.title || '', align: 'center', style: { fontSize: '13px', fontWeight: '500', color: t.text } };
  const axisLabel = { style: { colors: t.text2, fontSize: '11px' } };
  const axisTitle = color => ({ style: { color, fontSize: '11px' } });

  let options = {};

  switch (spec.type) {

    case 'timeline': {
      // Group rows by group/category — each group is a coloured series
      const groups = new Map();
      (spec.data || []).forEach(d => {
        const grp = d.group || d.category || 'Task';
        if (!groups.has(grp)) groups.set(grp, []);
        groups.get(grp).push({
          x: d.label || d.name || '',
          y: [new Date(d.start).getTime(), new Date(d.end).getTime()],
        });
      });
      const series = Array.from(groups, ([name, data]) => ({ name, data }));
      options = {
        chart: { ...baseChart, type: 'rangeBar', height: '100%' },
        series,
        plotOptions: { bar: { horizontal: true, barHeight: '65%', rangeBarGroupRows: true } },
        colors: CHART_COLORS,
        xaxis: { type: 'datetime', labels: axisLabel },
        yaxis: { labels: axisLabel },
        legend: { show: groups.size > 1, labels: { colors: t.text }, fontSize: '11px' },
        title: titleOpt,
        tooltip: { x: { format: 'MMM dd yyyy' } },
        theme: { mode: 'light' },
        grid: { borderColor: t.grid },
      };
      break;
    }

    case 'rangebar': {
      const data = (spec.data || []).map(d => ({
        x: d.label || d.name || d.category || '',
        y: [+(d.min ?? d.low ?? 0), +(d.max ?? d.high ?? 0)],
      }));
      options = {
        chart: { ...baseChart, type: 'rangeBar', height: '100%' },
        series: [{ name: spec.seriesLabel || 'Range', data }],
        plotOptions: { bar: { horizontal: true, barHeight: '45%' } },
        colors: [CHART_COLORS[0]],
        xaxis: {
          labels: axisLabel,
          ...(spec.xLabel ? { title: { text: spec.xLabel, ...axisTitle(t.text2) } } : {}),
        },
        yaxis: { labels: axisLabel },
        title: titleOpt,
        tooltip: { y: { formatter: v => v.toLocaleString() } },
        theme: { mode: 'light' },
        grid: { borderColor: t.grid },
      };
      break;
    }

    case 'rangearea': {
      const labels = spec.labels || [];
      const low  = spec.low  || [];
      const high = spec.high || [];
      const data = labels.map((x, i) => ({ x, y: [+(low[i] ?? 0), +(high[i] ?? 0)] }));
      options = {
        chart: { ...baseChart, type: 'rangeArea', height: '100%' },
        series: [{ name: spec.seriesLabel || 'Range', type: 'rangeArea', data }],
        colors: [CHART_COLORS[0]],
        fill: { opacity: [0.22] },
        stroke: { curve: 'smooth', width: [2] },
        xaxis: {
          categories: labels,
          labels: axisLabel,
          ...(spec.xLabel ? { title: { text: spec.xLabel, ...axisTitle(t.text2) } } : {}),
        },
        yaxis: {
          labels: { ...axisLabel, formatter: v => v.toLocaleString() },
          ...(spec.yLabel ? { title: { text: spec.yLabel, ...axisTitle(t.text2) } } : {}),
        },
        title: titleOpt,
        tooltip: { shared: false },
        theme: { mode: 'light' },
        grid: { borderColor: t.grid },
      };
      break;
    }

  }

  new ApexCharts(wrap, options).render();
}

// ── Dynet3D renderer ────────────────────────────────────────────────────────
// Generalized 3D dynamic network visualization inspired by Dynet3D
// (iDataVisualizationLab/HPCC). Renders a time series of network snapshots as
// parallel 2D planes stacked along the z-axis; same-id nodes are linked across
// time slices to show entity timelines. Powered by Three.js + d3-force.
function renderDynet3D(wrap, spec) {
  if (!wrap.style.height) wrap.style.height = '620px';
  wrap._chartSpec = spec;
  const t = getThemeColors();

  // ── Parse + normalize input ──────────────────────────────────────────────
  // Accept flat events array (e.g. [{year, source, target, category, value}])
  // and convert to snapshots format so callers don't need to reshape their data.
  if (spec.events && !spec.snapshots) {
    const byTime = new Map();
    spec.events.forEach(ev => {
      const t = String(ev.year ?? ev.time ?? ev.period ?? ev.date ?? ev.month ?? '');
      if (!byTime.has(t)) byTime.set(t, []);
      byTime.get(t).push({
        source: String(ev.source || ev.src || ev.from || ''),
        target: String(ev.target || ev.dst || ev.to || ''),
        type:   ev.category || ev.type || undefined,
        value:  ev.value || ev.count || 1,
      });
    });
    const sortedTimes = [...byTime.keys()].sort((a, b) =>
      a.localeCompare(b, undefined, { numeric: true })
    );
    spec = { ...spec, snapshots: sortedTimes.map(t => ({ time: t, links: byTime.get(t) })) };
    if (!spec.timeLabels) spec = { ...spec, timeLabels: sortedTimes };
  }

  const snapshots = (spec.snapshots || []).map((s, i) => ({
    time: s.time != null ? String(s.time) : ('T' + i),
    activeNodes: (s.activeNodes || []).map(String),
    links: (s.links || []).map(l => ({ ...l, source: String(l.source), target: String(l.target) })),
  }));
  const timeLabels = spec.timeLabels && spec.timeLabels.length
    ? spec.timeLabels.map(String)
    : snapshots.map(s => s.time);
  const T = snapshots.length;

  const nodeMap = new Map();
  (spec.nodes || []).forEach(n => {
    nodeMap.set(String(n.id), { ...n, id: String(n.id) });
  });
  snapshots.forEach(snap => {
    snap.links.forEach(l => {
      [l.source, l.target].forEach(id => {
        if (!nodeMap.has(id)) nodeMap.set(id, { id, name: id });
      });
    });
    snap.activeNodes.forEach(id => {
      if (!nodeMap.has(id)) nodeMap.set(id, { id, name: id });
    });
  });
  const allNodes = [...nodeMap.values()];
  const nodeTypes = [...new Set(allNodes.map(n => n.type).filter(Boolean))];

  // Aggregate union of links for layout
  const aggMap = new Map();
  snapshots.forEach(snap => {
    snap.links.forEach(l => {
      if (l.source === l.target) return;
      const key = [l.source, l.target].sort().join('|');
      aggMap.set(key, { source: l.source, target: l.target });
    });
  });

  // ── 2D layout via d3-force ───────────────────────────────────────────────
  const positions = new Map();
  if (allNodes.length === 0 || typeof d3 === 'undefined') {
    allNodes.forEach((n, i) => {
      const a = (i / Math.max(1, allNodes.length)) * Math.PI * 2;
      positions.set(n.id, { x: Math.cos(a) * 100, y: Math.sin(a) * 100 });
    });
  } else {
    const simNodes = allNodes.map(n => ({ id: n.id }));
    const simLinks = [...aggMap.values()].map(l => ({ source: l.source, target: l.target }));
    const sim = d3.forceSimulation(simNodes)
      .force('link', d3.forceLink(simLinks).id(d => d.id).distance(40).strength(0.6))
      .force('charge', d3.forceManyBody().strength(-100))
      .force('center', d3.forceCenter(0, 0))
      .force('collide', d3.forceCollide(10))
      .stop();
    const ticks = Math.min(400, Math.max(120, Math.round(300 - simNodes.length * 0.5)));
    for (let i = 0; i < ticks; i++) sim.tick();
    simNodes.forEach(n => positions.set(n.id, { x: n.x, y: n.y }));
  }

  // Center + extent
  const xs = [...positions.values()].map(p => p.x);
  const ys = [...positions.values()].map(p => p.y);
  const xMin = Math.min(...xs, 0), xMax = Math.max(...xs, 0);
  const yMin = Math.min(...ys, 0), yMax = Math.max(...ys, 0);
  const cx = (xMin + xMax) / 2, cy = (yMin + yMax) / 2;
  positions.forEach(p => { p.x -= cx; p.y -= cy; });
  const planeW = Math.max(200, (xMax - xMin) * 1.2);
  const planeH = Math.max(150, (yMax - yMin) * 1.2);
  const extent = Math.max(planeW, planeH);

  // ── Build DOM (canvas + side panel) ──────────────────────────────────────
  wrap.innerHTML = '';
  wrap.style.position = 'relative';
  wrap.style.padding = '0';
  wrap.style.overflow = 'hidden';

  const canvasDiv = document.createElement('div');
  canvasDiv.style.cssText = 'position:absolute;left:0;right:230px;top:0;bottom:0;overflow:hidden;background:#ffffff;';
  wrap.appendChild(canvasDiv);

  if (spec.title) {
    const titleEl = document.createElement('div');
    titleEl.textContent = spec.title;
    titleEl.style.cssText = 'position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:500;color:' + t.text + ';pointer-events:none;z-index:4;';
    canvasDiv.appendChild(titleEl);
  }

  const frontBtn = document.createElement('button');
  frontBtn.textContent = 'Reset to Front view';
  frontBtn.style.cssText = 'position:absolute;top:8px;left:44px;font-size:11px;padding:4px 10px;border-radius:3px;border:0.5px solid var(--border2,#ccc);background:#fff;color:#444;cursor:pointer;z-index:5;';
  canvasDiv.appendChild(frontBtn);

  const sideBtn = document.createElement('button');
  sideBtn.textContent = 'Side view';
  sideBtn.style.cssText = 'position:absolute;top:8px;left:180px;font-size:11px;padding:4px 10px;border-radius:3px;border:0.5px solid var(--border2,#ccc);background:#fff;color:#444;cursor:pointer;z-index:5;';
  canvasDiv.appendChild(sideBtn);

  const panel = document.createElement('div');
  panel.style.cssText = 'position:absolute;right:0;top:0;bottom:0;width:230px;padding:12px;font-size:11px;background:var(--bg2,#f7f6f2);border-left:0.5px solid var(--border,rgba(0,0,0,0.1));overflow-y:auto;color:var(--text,#000);box-sizing:border-box;';
  wrap.appendChild(panel);

  // Check Three.js availability
  if (typeof THREE === 'undefined') {
    canvasDiv.innerHTML = '<div style="padding:20px;color:#888;font-size:13px;">Three.js failed to load — Dynet3D unavailable.</div>';
    return;
  }

  // ── Three.js scene ───────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);

  const W0 = canvasDiv.clientWidth || 800;
  const H0 = canvasDiv.clientHeight || 540;

  // Orthographic (parallel) projection — preserves true relative size and
  // makes node sizes look consistent across the depth axis.
  const aspect0 = W0 / H0;
  const frustumH0 = Math.max(planeH, planeW / Math.max(0.0001, aspect0)) * 1.15;
  const frustumW0 = frustumH0 * aspect0;
  const camDist = Math.max(800, extent * 2.5);
  const camera = new THREE.OrthographicCamera(
    -frustumW0 / 2, frustumW0 / 2,
     frustumH0 / 2, -frustumH0 / 2,
    -50000, 50000
  );
  const frontPos = [0, 0, camDist];
  camera.position.set(...frontPos);
  camera.zoom = 1;
  camera.lookAt(0, 0, 0);
  camera.updateProjectionMatrix();

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(W0, H0);
  renderer.setPixelRatio(window.devicePixelRatio);
  canvasDiv.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.target.set(0, 0, 0);

  frontBtn.onclick = () => {
    camera.position.set(...frontPos);
    controls.target.set(0, 0, 0);
    if (typeof fitFrontView === 'function') fitFrontView();
    else { camera.zoom = 1; camera.updateProjectionMatrix(); }
    controls.update();
  };
  sideBtn.onclick = () => {
    const d = Math.max(camDist, T * 100);
    camera.position.set(-d * 0.7, d * 0.35, d * 0.7);
    camera.zoom = 1;
    camera.updateProjectionMatrix();
    controls.target.set(0, 0, 0);
    controls.update();
  };

  // ── Mutable state ────────────────────────────────────────────────────────
  // showVariations defaults to OFF — the dim ghost spheres for inactive nodes
  // overwhelm dense graphs. Users can opt in.
  const state = {
    showVariations: false,
    showTimelines: true,
    showUsers: true,
    showNodes: true,
    showLabels: true,
    showTimeLabels: true,
    linkType: 'straight',
    linkOpacity: 0.7,
    networkExpand: Math.max(40, Math.min(220, extent * 0.5)),
    timeResolution: 1,
    visualizing: 'all',
    searchTerm: '',
    nodeSize: 0.2,
    labelSize: 0.3,
    timeLabelSize: 1.6,  // time labels are bigger than node labels
    labelsNearOnly: false,
    labelNearDist: 0.6,
    // Default to "all" — occlusion handles clutter at render time, so the
    // candidate cap is mostly a perf knob for very large datasets.
    maxNodeLabels: 0,    // filled in once allNodes is known
  };
  state.maxNodeLabels = allNodes.length;

  // ── Link categories (for legend + per-category toggle) ───────────────────
  const linkCats = new Set();
  snapshots.forEach(s => s.links.forEach(l => { if (l.type) linkCats.add(String(l.type)); }));
  const linkCatList = [...linkCats];
  const catColor = new Map();
  const catVisible = new Map();
  const palette = (typeof CHART_COLORS !== 'undefined' && CHART_COLORS.length)
    ? CHART_COLORS
    : ['#534AB7', '#E85858', '#2E9CDB', '#27AE60', '#F2994A', '#9B51E0', '#56CCF2', '#F2C94C'];
  linkCatList.forEach((c, i) => {
    catColor.set(c, palette[i % palette.length]);
    catVisible.set(c, true);
  });

  // ── Aggregate degree across all snapshots (for top-N label selection) ───
  const aggDegree = new Map();
  snapshots.forEach(s => s.links.forEach(l => {
    aggDegree.set(l.source, (aggDegree.get(l.source) || 0) + 1);
    aggDegree.set(l.target, (aggDegree.get(l.target) || 0) + 1);
  }));

  const groups = {
    planes: new THREE.Group(),
    nodes: new THREE.Group(),
    links: new THREE.Group(),
    timelines: new THREE.Group(),
    labels: new THREE.Group(),
    timeLabels: new THREE.Group(),
  };
  Object.values(groups).forEach(g => scene.add(g));

  function clearGroup(g) {
    while (g.children.length) {
      const c = g.children.pop();
      if (c.geometry) c.geometry.dispose();
      if (c.material) {
        // Don't dispose label textures — they're shared from labelTexCache.
        if (c.material.map && !c.material.map._cached) c.material.map.dispose();
        c.material.dispose();
      }
    }
  }

  // Label textures are shared across slices: many sprites use the same text
  // (e.g. "172.28.22.186" labelled at every slice the IP is active in), so
  // we allocate one CanvasTexture per unique (text, color) and reuse it.
  const labelTexCache = new Map();
  function makeTextSprite(text, color, sizeMul) {
    const key = String(text) + '|' + (color || '#333');
    let cached = labelTexCache.get(key);
    if (!cached) {
      const fontSize = 28;
      const bold = (color === '#4a6cb3' || color === '#3858b8');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.font = (bold ? '600 ' : '') + fontSize + 'px Segoe UI, system-ui, sans-serif';
      const txt = String(text);
      const w = Math.ceil(ctx.measureText(txt).width) + 10;
      canvas.width = w; canvas.height = fontSize + 10;
      ctx.font = (bold ? '600 ' : '') + fontSize + 'px Segoe UI, system-ui, sans-serif';
      ctx.fillStyle = color || '#333';
      ctx.textBaseline = 'middle';
      ctx.fillText(txt, 5, canvas.height / 2);
      const tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      tex._cached = true;
      cached = { canvas, tex };
      labelTexCache.set(key, cached);
    }
    const mat = new THREE.SpriteMaterial({ map: cached.tex, transparent: true, depthTest: false });
    const sprite = new THREE.Sprite(mat);
    const s = extent * 0.0010 * state.labelSize * (sizeMul || 1);
    // _baseScale is the "screen-fixed" world scale. The per-frame label pass
    // divides this by camera.zoom so labels stay the same pixel size while
    // the user zooms in/out.
    sprite._baseScale = { x: cached.canvas.width * s, y: cached.canvas.height * s };
    sprite.scale.set(sprite._baseScale.x, sprite._baseScale.y, 1);
    return sprite;
  }

  function nodeColor(n, active) {
    if (!active) return 0xcccccc;
    if (n.color) return new THREE.Color(n.color).getHex();
    if (n.type === 'user') return 0x534AB7;
    if (n.type === 'job')  return 0xE85858;
    if (n.type === 'node') return 0x666666;
    return 0x2E9CDB;
  }

  function isVisibleByType(n) {
    if (!state.showUsers && n.type === 'user') return false;
    if (!state.showNodes && n.type !== 'user') return false;
    if (state.visualizing !== 'all' && n.type !== state.visualizing) return false;
    return true;
  }

  function matchesSearch(n) {
    if (!state.searchTerm) return true;
    const term = state.searchTerm.toLowerCase();
    return (n.id.toLowerCase().includes(term)) || ((n.name || '').toLowerCase().includes(term));
  }

  // ── (Re)build scene ──────────────────────────────────────────────────────
  function buildScene() {
    Object.values(groups).forEach(clearGroup);
    if (T === 0) return;

    // Aggregate by time resolution
    const bins = [];
    for (let i = 0; i < T; i += state.timeResolution) {
      const merged = {
        label: timeLabels[i] || ('T' + i),
        activeNodes: new Set(),
        links: [],
      };
      for (let j = i; j < Math.min(T, i + state.timeResolution); j++) {
        const s = snapshots[j];
        s.activeNodes.forEach(id => merged.activeNodes.add(id));
        s.links.forEach(l => {
          merged.activeNodes.add(l.source);
          merged.activeNodes.add(l.target);
          merged.links.push(l);
        });
      }
      bins.push(merged);
    }
    const N = bins.length;
    const spacing = state.networkExpand;
    const totalDepth = (N - 1) * spacing;
    const z0 = -totalDepth / 2;

    // ── Category + search filters cascade to nodes ───────────────────────
    // A node is "effective-active" at slice i only if it has at least one
    // incident link there whose category is currently visible AND (when a
    // search term is set) at least one endpoint matches the search.
    // Untyped links count as visible. Active nodes with no links at this
    // slice (rare; happens only when the user supplied explicit
    // `activeNodes`) are kept regardless so they don't disappear silently.
    const isLinkCatVisible = (l) =>
      !l.type || !catVisible.has(l.type) || catVisible.get(l.type);
    const passesSearchId = (id) => {
      if (!state.searchTerm) return true;
      const n = nodeMap.get(id);
      return n ? matchesSearch(n) : false;
    };
    const isLinkVisible = (l) => {
      if (!isLinkCatVisible(l)) return false;
      if (!state.searchTerm) return true;
      // Strict: both endpoints must match the search term, so the visible
      // network is the induced subgraph on the matching node set.
      return passesSearchId(l.source) && passesSearchId(l.target);
    };
    const effectiveActive = bins.map(bin => {
      const set = new Set();
      bin.links.forEach(l => {
        if (!isLinkVisible(l)) return;
        set.add(l.source); set.add(l.target);
      });
      bin.activeNodes.forEach(id => {
        if (state.searchTerm && !passesSearchId(id)) return;
        if (!bin.links.some(l => l.source === id || l.target === id)) set.add(id);
      });
      return set;
    });

    // ── Time axis: blue arrow along z at the top of the scene ──────────────
    // All time labels are anchored to this axis so they form a single line
    // parallel to the time dimension instead of scattering above the planes.
    const axisX = -planeW / 2;
    const axisY = planeH / 2 + extent * 0.10;
    const arrowPad = Math.max(40, spacing * 0.5);
    const arrowStart = new THREE.Vector3(axisX, axisY, z0 - arrowPad);
    const arrowEnd   = new THREE.Vector3(axisX, axisY, z0 + totalDepth + arrowPad);
    const arrowDir   = new THREE.Vector3().subVectors(arrowEnd, arrowStart).normalize();
    const arrowLen   = arrowStart.distanceTo(arrowEnd);
    const headLen    = Math.max(20, Math.min(60, arrowLen * 0.05));
    const headWidth  = headLen * 0.4;
    const axisArrow  = new THREE.ArrowHelper(arrowDir, arrowStart, arrowLen, 0x3858b8, headLen, headWidth);
    if (state.showTimeLabels) groups.planes.add(axisArrow);

    // Time planes (grids)
    bins.forEach((bin, i) => {
      const z = z0 + i * spacing;
      const planeGeo = new THREE.PlaneGeometry(planeW, planeH, 8, 6);
      const wireMat = new THREE.LineBasicMaterial({ color: 0xbcbcbc, transparent: true, opacity: 0.35 });
      const wire = new THREE.LineSegments(new THREE.EdgesGeometry(planeGeo), wireMat);
      wire.position.z = z;
      groups.planes.add(wire);
      planeGeo.dispose();

      // Subtle interior grid
      const gh = new THREE.GridHelper(Math.max(planeW, planeH), 6, 0xdddddd, 0xdddddd);
      gh.rotation.x = Math.PI / 2;
      gh.position.z = z;
      gh.material.transparent = true;
      gh.material.opacity = 0.18;
      groups.planes.add(gh);

      // Time tick label anchored on the axis arrow at this plane's z. Always
      // visible by default; shown in blue at 1.6× the node-label size.
      if (state.showTimeLabels) {
        const tlab = makeTextSprite(bin.label, '#3858b8', state.timeLabelSize);
        tlab.position.set(axisX + extent * 0.02, axisY + extent * 0.012, z);
        tlab.userData = { kind: 'timeLabel' };
        groups.timeLabels.add(tlab);
      }
    });

    // Nodes per time slice. Base radius is intentionally small; the user
    // tunes with the "Node size" slider in the panel.
    const baseR    = Math.max(1.2, extent * 0.005) * state.nodeSize;
    const variantR = Math.max(0.7, extent * 0.0025) * state.nodeSize;
    const sphereGeo = new THREE.SphereGeometry(baseR, 10, 10);
    const variationGeo = new THREE.SphereGeometry(variantR, 6, 6);
    bins.forEach((bin, i) => {
      const z = z0 + i * spacing;
      allNodes.forEach(n => {
        if (!isVisibleByType(n)) return;
        if (!matchesSearch(n)) return;
        const active = effectiveActive[i].has(n.id);
        if (!active && !state.showVariations) return;
        const pos = positions.get(n.id);
        const col = nodeColor(n, active);
        const mat = new THREE.MeshBasicMaterial({
          color: col,
          transparent: !active,
          opacity: active ? 1 : 0.35,
        });
        const mesh = new THREE.Mesh(active ? sphereGeo : variationGeo, mat);
        mesh.position.set(pos.x, pos.y, z);
        mesh.userData = { kind: 'node', id: n.id, time: i, name: n.name || n.id };
        groups.nodes.add(mesh);
      });
    });

    // Links per slice
    bins.forEach((bin, i) => {
      const z = z0 + i * spacing;
      bin.links.forEach(l => {
        // Apply both filters (category + search) at once.
        if (!isLinkVisible(l)) return;
        const sN = nodeMap.get(l.source), tN = nodeMap.get(l.target);
        if (!sN || !tN) return;
        if (!isVisibleByType(sN) || !isVisibleByType(tN)) return;
        const a = positions.get(l.source);
        const b = positions.get(l.target);
        if (!a || !b) return;
        let pts;
        if (state.linkType === 'curved') {
          const dx = b.x - a.x, dy = b.y - a.y;
          const dist = Math.hypot(dx, dy) || 1;
          const nx = -dy / dist, ny = dx / dist;
          const mx = (a.x + b.x) / 2 + nx * dist * 0.18;
          const my = (a.y + b.y) / 2 + ny * dist * 0.18;
          const curve = new THREE.QuadraticBezierCurve3(
            new THREE.Vector3(a.x, a.y, z),
            new THREE.Vector3(mx, my, z),
            new THREE.Vector3(b.x, b.y, z)
          );
          pts = curve.getPoints(16);
        } else {
          pts = [new THREE.Vector3(a.x, a.y, z), new THREE.Vector3(b.x, b.y, z)];
        }
        const geom = new THREE.BufferGeometry().setFromPoints(pts);
        const color = l.color ? new THREE.Color(l.color).getHex()
          : (l.type && catColor.has(l.type)) ? new THREE.Color(catColor.get(l.type)).getHex()
          : (l.type === 'add' ? 0x2da14a : l.type === 'remove' ? 0xe85858 : 0xa83232);
        const mat = new THREE.LineBasicMaterial({
          color, transparent: true, opacity: state.linkOpacity,
        });
        const line = new THREE.Line(geom, mat);
        line.userData = { kind: 'link', source: l.source, target: l.target, time: i, type: l.type };
        groups.links.add(line);
      });
    });

    // Entity timelines (same id across slices)
    if (state.showTimelines && N > 1) {
      allNodes.forEach(n => {
        if (!isVisibleByType(n)) return;
        if (!matchesSearch(n)) return;
        const presentZ = [];
        bins.forEach((bin, i) => {
          if (effectiveActive[i].has(n.id)) presentZ.push(z0 + i * spacing);
        });
        if (presentZ.length < 2) return;
        const pos = positions.get(n.id);
        const pts = presentZ.map(z => new THREE.Vector3(pos.x, pos.y, z));
        const geom = new THREE.BufferGeometry().setFromPoints(pts);
        const mat = new THREE.LineBasicMaterial({
          color: nodeColor(n, true),
          transparent: true,
          opacity: 0.5,
        });
        const line = new THREE.Line(geom, mat);
        line.userData = { kind: 'timeline', id: n.id };
        groups.timelines.add(line);
      });
    }

    // Node labels — labelled at every slice the node is active in (so labels
    // are consistent and don't blink in/out as the camera rotates). Visibility
    // is then resolved per-frame by the screen-space occlusion pass, which
    // hides labels that overlap higher-priority labels.
    if (state.showLabels) {
      // Eligible IDs = top-N by aggregate degree, plus any search-matched IDs.
      let candidateIds;
      const visibleNodes = allNodes.filter(isVisibleByType);
      if (state.maxNodeLabels >= visibleNodes.length) {
        candidateIds = new Set(visibleNodes.map(n => n.id));
      } else {
        const sorted = [...visibleNodes].sort(
          (a, b) => (aggDegree.get(b.id) || 0) - (aggDegree.get(a.id) || 0)
        );
        candidateIds = new Set(
          sorted.slice(0, Math.max(0, state.maxNodeLabels)).map(n => n.id)
        );
      }
      if (state.searchTerm) {
        visibleNodes.forEach(n => { if (matchesSearch(n)) candidateIds.add(n.id); });
      }
      bins.forEach((bin, i) => {
        const z = z0 + i * spacing;
        effectiveActive[i].forEach(id => {
          if (!candidateIds.has(id)) return;
          const n = nodeMap.get(id);
          if (!n) return;
          const pos = positions.get(id);
          if (!pos) return;
          const sp = makeTextSprite(n.name || n.id, '#555');
          sp.position.set(pos.x, pos.y + Math.max(2, baseR * 1.6), z);
          sp.userData = { kind: 'label', id, time: i };
          groups.labels.add(sp);
        });
      });
    }
    labelDirty = true;
  }

  // Declared before the first buildScene() call because buildScene flips it.
  let labelDirty = true;
  let lastCamHash = '';

  buildScene();

  // ── Hover highlight: dims everything not associated with the focused id ──
  function setHighlight(focusId) {
    const isRelated = (u) => {
      if (!u || !u.kind) return false;
      if (u.id === focusId) return true;
      if (u.kind === 'link' && (u.source === focusId || u.target === focusId)) return true;
      return false;
    };
    const apply = (g) => g.children.forEach(o => {
      if (!o.material) return;
      if (o._origOpacity == null) {
        o._origOpacity = o.material.opacity;
        o._origTransparent = o.material.transparent;
      }
      if (focusId == null) {
        o.material.opacity = o._origOpacity;
        o.material.transparent = o._origTransparent;
      } else if (isRelated(o.userData)) {
        o.material.opacity = Math.min(1, Math.max(0.85, o._origOpacity));
        o.material.transparent = true;
      } else {
        o.material.opacity = o._origOpacity * 0.08;
        o.material.transparent = true;
      }
    });
    apply(groups.nodes); apply(groups.links);
    apply(groups.timelines); apply(groups.labels);
  }
  let currentFocus = null;

  // ── Fit-to-content for the Front view ────────────────────────────────────
  // After the scene is built, pick a zoom that keeps the active node cloud
  // comfortably within the viewport. Re-invoked when the user clicks Front view.
  function fitFrontView() {
    if (!positions.size) return;
    let mnX = Infinity, mxX = -Infinity, mnY = Infinity, mxY = -Infinity;
    positions.forEach(p => {
      if (p.x < mnX) mnX = p.x; if (p.x > mxX) mxX = p.x;
      if (p.y < mnY) mnY = p.y; if (p.y > mxY) mxY = p.y;
    });
    const cw = Math.max(1, mxX - mnX);
    const ch = Math.max(1, mxY - mnY);
    const fitZoom = Math.min(
      (camera.right - camera.left) / cw,
      (camera.top   - camera.bottom) / ch
    ) * 0.85;
    camera.zoom = Math.max(0.1, Math.min(20, fitZoom));
    camera.updateProjectionMatrix();
  }
  fitFrontView();

  // ── Side panel UI ────────────────────────────────────────────────────────
  const visualizingOptions = ['<option value="all">All</option>']
    .concat(nodeTypes.map(typ => `<option value="${typ}">${typ}</option>`)).join('');
  const row = (lbl, ctrl) => `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;gap:8px;"><span style="color:var(--text2,#666);">${lbl}</span>${ctrl}</div>`;
  const inputStyle = 'font-size:11px;padding:2px 4px;background:var(--bg,#fff);color:var(--text,#000);border:0.5px solid var(--border2,#ccc);border-radius:3px;';
  const cb = (key) => `<input type="checkbox" data-key="${key}">`;
  const sel = (key, opts) => `<select data-key="${key}" style="${inputStyle}">${opts}</select>`;
  const rng = (key, min, max, step, val) => `<input type="range" data-key="${key}" min="${min}" max="${max}" step="${step}" value="${val}" style="width:110px;">`;

  panel.innerHTML = `
    <div style="font-weight:600;font-size:12px;margin-bottom:8px;color:var(--text,#000);">Control panel</div>

    <div style="font-size:10px;color:var(--text3,#999);text-transform:uppercase;letter-spacing:0.05em;margin:6px 0 4px;">Input</div>
    ${nodeTypes.length > 1 ? row('Visualizing', sel('visualizing', visualizingOptions)) : ''}
    ${row('# Time-steps', `<span style="font-weight:500;">${T}</span>`)}

    <div style="font-size:10px;color:var(--text3,#999);text-transform:uppercase;letter-spacing:0.05em;margin:10px 0 4px;">Settings</div>
    ${row('Show Variations', cb('showVariations'))}
    ${row('Show timelines', cb('showTimelines'))}
    ${row('Show users', cb('showUsers'))}
    ${row('Show nodes', cb('showNodes'))}
    ${row('Show labels', cb('showLabels'))}
    ${row('Show time labels', cb('showTimeLabels'))}
    ${row('Labels near camera', cb('labelsNearOnly'))}
    ${row('Label cutoff', rng('labelNearDist', 0.1, 2, 0.05, state.labelNearDist))}
    ${row('Node size', rng('nodeSize', 0.2, 4, 0.1, state.nodeSize))}
    ${row('Label size', rng('labelSize', 0.3, 3, 0.1, state.labelSize))}
    ${row('Max node labels', rng('maxNodeLabels', 0, Math.max(50, allNodes.length), 1, state.maxNodeLabels))}
    ${row('Link type', sel('linkType', '<option value="straight">Straight</option><option value="curved">Curved</option>'))}
    ${row('Link opacity', rng('linkOpacity', 0, 1, 0.05, state.linkOpacity))}
    ${row('Network Expand', rng('networkExpand', 10, 1200, 10, state.networkExpand))}
    ${row('Time Resolution', sel('timeResolution', '<option value="1">1×</option><option value="2">2×</option><option value="3">3×</option><option value="5">5×</option>'))}

    ${linkCatList.length ? `
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin:10px 0 4px;">
        <span style="font-size:10px;color:var(--text3,#999);text-transform:uppercase;letter-spacing:0.05em;">Link types</span>
        <a id="dyn-legend-toggle" style="cursor:pointer;color:var(--accent,#534AB7);font-size:10px;user-select:none;">Hide all</a>
      </div>
      <div id="dyn-legend" style="display:flex;flex-wrap:wrap;gap:3px 8px;">
        ${linkCatList.map(c => `
          <span data-cat="${String(c).replace(/"/g, '&quot;')}" style="display:inline-flex;align-items:center;gap:4px;cursor:pointer;user-select:none;font-size:10px;">
            <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${catColor.get(c)};"></span>${c}
          </span>
        `).join('')}
      </div>
    ` : ''}

    <div style="font-size:10px;color:var(--text3,#999);text-transform:uppercase;letter-spacing:0.05em;margin:10px 0 4px;">Output</div>
    ${row('Total nodes', `<span data-out="totalNodes" style="font-weight:500;"></span>`)}
    ${row('Total links', `<span data-out="totalLinks" style="font-weight:500;"></span>`)}

    <input type="text" placeholder="Search e.g. node1" data-key="searchTerm" style="width:100%;margin-top:10px;padding:5px 8px;${inputStyle}">
  `;

  const totalLinks = snapshots.reduce((acc, s) => acc + s.links.length, 0);
  panel.querySelector('[data-out="totalNodes"]').textContent = allNodes.length;
  panel.querySelector('[data-out="totalLinks"]').textContent = totalLinks;

  // ── Legend click toggles for link categories ─────────────────────────────
  const legendEl = panel.querySelector('#dyn-legend');
  const legendToggleEl = panel.querySelector('#dyn-legend-toggle');
  const refreshLegendStyles = () => {
    if (!legendEl) return;
    legendEl.querySelectorAll('[data-cat]').forEach(el => {
      const on = catVisible.get(el.dataset.cat);
      el.style.opacity = on ? '1' : '0.35';
      el.style.textDecoration = on ? 'none' : 'line-through';
    });
    if (legendToggleEl) {
      const anyOn = linkCatList.some(c => catVisible.get(c));
      legendToggleEl.textContent = anyOn ? 'Hide all' : 'Show all';
    }
  };
  if (legendEl) {
    legendEl.querySelectorAll('[data-cat]').forEach(el => {
      el.addEventListener('click', () => {
        const c = el.dataset.cat;
        catVisible.set(c, !catVisible.get(c));
        refreshLegendStyles();
        buildScene();
      });
    });
  }
  if (legendToggleEl) {
    legendToggleEl.addEventListener('click', () => {
      const anyOn = linkCatList.some(c => catVisible.get(c));
      linkCatList.forEach(c => catVisible.set(c, !anyOn));
      refreshLegendStyles();
      buildScene();
    });
  }

  // Keys whose changes don't require rebuilding the scene (handled in animate loop)
  const NO_REBUILD = new Set(['labelsNearOnly', 'labelNearDist']);

  // Wire inputs
  panel.querySelectorAll('[data-key]').forEach(el => {
    const k = el.dataset.key;
    if (el.type === 'checkbox') el.checked = state[k];
    else el.value = String(state[k]);
    const update = () => {
      let v;
      if (el.type === 'checkbox') v = el.checked;
      else if (el.type === 'range') v = +el.value;
      else if (el.tagName === 'SELECT') {
        v = isFinite(+el.value) && el.value !== '' ? +el.value : el.value;
      } else v = el.value;
      state[k] = v;
      if (NO_REBUILD.has(k)) labelDirty = true;
      else buildScene();
    };
    el.addEventListener('change', update);
    if (el.type === 'range' || el.type === 'text') el.addEventListener('input', update);
  });

  // ── Hover tooltip ────────────────────────────────────────────────────────
  const tooltip = document.createElement('div');
  tooltip.style.cssText = 'position:absolute;pointer-events:none;background:rgba(0,0,0,0.78);color:#fff;font-size:11px;padding:4px 8px;border-radius:3px;display:none;z-index:10;white-space:nowrap;';
  canvasDiv.appendChild(tooltip);

  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  renderer.domElement.addEventListener('pointermove', e => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hit = raycaster.intersectObjects(groups.nodes.children, false)[0];
    const newFocus = hit && hit.object.userData && hit.object.userData.id ? hit.object.userData.id : null;
    if (hit && newFocus) {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX - rect.left + 8) + 'px';
      tooltip.style.top = (e.clientY - rect.top + 8) + 'px';
      const ud = hit.object.userData;
      tooltip.textContent = ud.name + ' @ ' + (timeLabels[ud.time * state.timeResolution] || ('T' + ud.time));
    } else {
      tooltip.style.display = 'none';
    }
    if (newFocus !== currentFocus) {
      currentFocus = newFocus;
      setHighlight(currentFocus);
    }
  });
  renderer.domElement.addEventListener('pointerleave', () => {
    tooltip.style.display = 'none';
    if (currentFocus != null) { currentFocus = null; setHighlight(null); }
  });

  // ── Label visibility: distance + screen-space occlusion ─────────────────
  // Runs only when the camera pose changes (or after a scene rebuild). Picks
  // a non-overlapping set of labels in screen space, prioritised by node
  // degree and depth toward the camera. `labelDirty` and `lastCamHash` are
  // declared earlier so buildScene() can flip the dirty flag.
  function camHash() {
    const p = camera.position, t = controls.target;
    return [p.x, p.y, p.z, t.x, t.y, t.z, camera.zoom]
      .map(v => v.toFixed(1)).join(',');
  }

  const _viewDir = new THREE.Vector3();
  const _tmp = new THREE.Vector3();
  const _proj = new THREE.Vector3();
  function updateLabelVisibility() {
    const sw = renderer.domElement.clientWidth;
    const sh = renderer.domElement.clientHeight;
    if (!sw || !sh) return;
    camera.getWorldDirection(_viewDir);
    const cutoff = (camDist + extent) * state.labelNearDist;
    const frustumW = (camera.right - camera.left) / Math.max(0.0001, camera.zoom);
    const frustumH = (camera.top   - camera.bottom) / Math.max(0.0001, camera.zoom);
    const zoomInv = 1 / Math.max(0.0001, camera.zoom);

    // Keep labels at a constant screen size: divide their world scale by
    // camera.zoom so the on-screen pixel footprint matches the base scale.
    const applyZoomScale = sp => {
      if (!sp._baseScale) return;
      sp.scale.set(sp._baseScale.x * zoomInv, sp._baseScale.y * zoomInv, 1);
    };

    // Time labels: distance-cull only (no occlusion — they're axis ticks).
    groups.timeLabels.children.forEach(sp => {
      applyZoomScale(sp);
      if (!state.labelsNearOnly) { sp.visible = true; return; }
      _tmp.copy(sp.position).sub(camera.position);
      const depth = _tmp.dot(_viewDir);
      sp.visible = depth >= 0 && depth <= cutoff;
    });

    if (!state.showLabels) {
      groups.labels.children.forEach(sp => { sp.visible = false; });
      return;
    }

    // Gather candidate node labels (apply distance cull, project to screen).
    const items = [];
    groups.labels.children.forEach(sprite => {
      applyZoomScale(sprite);
      const u = sprite.userData;
      if (!u || u.kind !== 'label') { sprite.visible = false; return; }
      _tmp.copy(sprite.position).sub(camera.position);
      const depth = _tmp.dot(_viewDir);
      if (state.labelsNearOnly && (depth < 0 || depth > cutoff)) {
        sprite.visible = false; return;
      }
      _proj.copy(sprite.position).project(camera);
      if (_proj.x < -1.3 || _proj.x > 1.3 || _proj.y < -1.3 || _proj.y > 1.3) {
        sprite.visible = false; return;
      }
      const sx = (_proj.x + 1) * 0.5 * sw;
      const sy = (1 - _proj.y) * 0.5 * sh;
      const lw = (sprite.scale.x / frustumW) * sw;
      const lh = (sprite.scale.y / frustumH) * sh;
      const deg = aggDegree.get(u.id) || 0;
      // Higher degree wins; closer-to-camera depth as tiebreaker.
      const priority = deg * 1000 + (1 - _proj.z);
      items.push({ sprite, x0: sx - lw / 2, x1: sx + lw / 2,
                            y0: sy - lh / 2, y1: sy + lh / 2, priority });
    });
    items.sort((a, b) => b.priority - a.priority);

    const accepted = [];
    for (let k = 0; k < items.length; k++) {
      const it = items[k];
      let blocked = false;
      for (let j = 0; j < accepted.length; j++) {
        const a = accepted[j];
        if (it.x0 < a.x1 && it.x1 > a.x0 && it.y0 < a.y1 && it.y1 > a.y0) {
          blocked = true; break;
        }
      }
      if (blocked) { it.sprite.visible = false; }
      else { accepted.push(it); it.sprite.visible = true; }
    }
  }

  // ── Animation loop ───────────────────────────────────────────────────────
  let running = true;
  function animate() {
    if (!running) return;
    requestAnimationFrame(animate);
    controls.update();
    const hash = camHash();
    if (labelDirty || hash !== lastCamHash) {
      lastCamHash = hash;
      labelDirty = false;
      updateLabelVisibility();
    }
    renderer.render(scene, camera);
  }
  animate();

  // ── Resize handling ──────────────────────────────────────────────────────
  // Preserves the current frustum height; recomputes left/right from the new
  // aspect ratio so the scene neither stretches nor shrinks vertically.
  let _dynetResizeTimer;
  const _onDynetResize = () => {
    clearTimeout(_dynetResizeTimer);
    _dynetResizeTimer = setTimeout(() => {
      const w = canvasDiv.clientWidth, h = canvasDiv.clientHeight;
      if (w > 0 && h > 0) {
        const camH = camera.top - camera.bottom;
        const newAspect = w / h;
        const newW = camH * newAspect;
        camera.left = -newW / 2;
        camera.right = newW / 2;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }
    }, 100);
  };
  window.addEventListener('resize', _onDynetResize);

  // Stop animation when the wrap is removed from DOM
  const mo = new MutationObserver(() => {
    if (!document.body.contains(wrap)) {
      running = false;
      window.removeEventListener('resize', _onDynetResize);
      mo.disconnect();
      renderer.dispose();
    }
  });
  mo.observe(document.body, { childList: true, subtree: true });
}

// ── Chart registry ──────────────────────────────────────────────────────────
// Each entry: { render(wrap, spec), promptDescription }
// render()           — receives an empty .chart-wrap div and the parsed spec JSON
// promptDescription  — injected into the system prompt so the LLM knows the spec format
//
// To add a new chart type:
//   1. Add an entry below with a render function wrapping your chart code
//   2. Write a promptDescription that shows the LLM exactly what JSON to emit
const chartRegistry = {

  // ── Chart.js types ────────────────────────────────────────────────────────
  bar: {
    render: renderChartJS,
    promptDescription: '- **bar** — comparisons, rankings, grouped side-by-side metrics. Spec: { "type":"bar", "title":"...", "xLabel":"...", "yLabel":"...", "labels":[...], "datasets":[{"label":"...","data":[...]}] }',
  },
  line: {
    render: renderChartJS,
    promptDescription: '- **line** — trends over time; use date strings as labels. Same spec shape as bar.',
  },
  pie: {
    render: renderChartJS,
    promptDescription: '- **pie** — proportions/share (max 8 slices). Omit xLabel/yLabel. Same spec shape as bar.',
  },
  doughnut: {
    render: renderChartJS,
    promptDescription: '- **doughnut** — same as pie with a centre hole. Omit xLabel/yLabel.',
  },
  scatter: {
    render: renderChartJS,
    promptDescription: '- **scatter** — correlation between two numeric variables. data items must be {"x":n,"y":n} objects. Spec: { "type":"scatter", "title":"...", "xLabel":"...", "yLabel":"...", "datasets":[{"label":"...","data":[{"x":1,"y":2},...]}] }',
  },

  // ── ECharts types ─────────────────────────────────────────────────────────
  rose: {
    render: renderECharts,
    promptDescription: '- **rose** — Nightingale/rose chart; like a pie but petal radius encodes value magnitude. Good for ranked category comparisons. Spec: { "type":"rose", "title":"...", "data":[{"name":"...","value":123}] }',
  },
  radar: {
    render: renderECharts,
    promptDescription: '- **radar** — spider/web chart for multi-attribute comparison across entities. Spec: { "type":"radar", "title":"...", "indicators":[{"name":"...","max":100}], "datasets":[{"label":"...","data":[70,80,90]}] }',
  },
  heatmap: {
    render: renderECharts,
    promptDescription: '- **heatmap** — 2-D intensity matrix; ideal for time × category patterns (e.g. sales by month × territory). Spec: { "type":"heatmap", "title":"...", "xLabels":[...], "yLabels":[...], "data":[[xIdx,yIdx,value],...] }',
  },
  treemap: {
    render: renderECharts,
    promptDescription: '- **treemap** — nested rectangles for hierarchical part-of-whole (e.g. revenue by category → subcategory). Spec: { "type":"treemap", "title":"...", "data":[{"name":"...","value":123,"children":[{"name":"...","value":60}]}] }',
  },
  sunburst: {
    render: renderECharts,
    promptDescription: '- **sunburst** — radial hierarchy where each ring is a level (e.g. category → subcategory → product). Spec: { "type":"sunburst", "title":"...", "data":[{"name":"...","value":100,"children":[{"name":"...","value":60}]}] }',
  },
  parallel: {
    render: renderECharts,
    promptDescription: '- **parallel** — parallel coordinates for comparing entities across many numeric dimensions simultaneously (e.g. products by price, cost, margin, sales volume). Spec: { "type":"parallel", "title":"...", "dimensions":["Dim1","Dim2",...], "data":[{"label":"...","values":[v1,v2,...]}] }',
  },
  sankey: {
    render: renderECharts,
    promptDescription: '- **sankey** — flow/allocation diagram between nodes (e.g. territory → category → product revenue flow). Spec: { "type":"sankey", "title":"...", "nodes":["A","B","C"], "links":[{"source":"A","target":"B","value":100}] }',
  },
  funnel: {
    render: renderECharts,
    promptDescription: '- **funnel** — conversion or pipeline stages in descending order. Spec: { "type":"funnel", "title":"...", "data":[{"name":"Stage","value":1000}] }',
  },
  graph: {
    render: renderGraph,
    promptDescription: '- **graph** — network/relationship diagram with nodes and edges. Set `directed:true` for arrows (directed), omit or set `directed:false` for undirected. Optional `curved:true` for arc edges. Nodes support optional `size` (px) and `color` (hex string). Links support optional `label` (edge text), `color` (hex string, use this to color edges by category/type), and `value` (numeric weight — edge thickness is automatically scaled proportionally; always set this to the connection count or repeat count when available). Spec: { "type":"graph", "title":"...", "directed":true, "layout":"force", "nodes":[{"id":"1","name":"Node A"},{"id":"2","name":"Node B","size":50,"color":"#e05c5c"}], "links":[{"source":"1","target":"2","label":"DDoS","value":5,"color":"#e05c5c"}] }. Node ids in links must exactly match node id values. Use `layout:"circular"` for ring topology instead of force layout. When asked to color edges by type, assign a distinct hex color per type and set it on each link\'s `color` field. Render-side note: nodes sharing identical (partner, label) sets auto-collapse into a diamond ◆ "Group N (k)" node; degree-1 nodes sharing the same single partner auto-collapse into a "Leaves of <hub> (k)" node. Click ◆ to expand; click a red-bordered member to collapse. Legend swatches toggle category visibility.',
  },

  lineup: {
    render(wrap, spec) {
      wrap.classList.add('lineup-wrap');
      wrap.style.height = wrap.style.height || '520px';
      wrap._chartSpec = spec;
      const rows = spec.data || [];
      if (!rows.length) { wrap.textContent = 'No data'; return; }
      const colNames = Array.isArray(spec.columns)
        ? spec.columns.map(c => (typeof c === 'string' ? c : c.name))
        : Object.keys(rows[0]);
      const builder = LineUpJS.builder(rows).sidePanel(false);
      const numColColors = []; // { col, barColor, textColor }
      let numIdx = 0;
      colNames.forEach(col => {
        const sample = rows.find(r => r[col] != null);
        const isNum = typeof (sample ? sample[col] : null) === 'number';
        if (isNum) {
          const barColor = CHART_COLORS[numIdx++ % CHART_COLORS.length];
          const textColor = contrastColor(barColor);
          numColColors.push({ col, barColor, textColor });
          const vals = rows.map(r => +r[col]).filter(v => !isNaN(v));
          builder.column(
            LineUpJS.buildNumberColumn(col, [Math.min(...vals), Math.max(...vals)])
              .color(barColor)
          );
        } else {
          builder.column(LineUpJS.buildStringColumn(col));
        }
      });
      builder.defaultRanking();
      builder.build(wrap);
      // Double rAF: wait for layout to commit before LineUp recalculates column widths.
      // Also inject per-column contrast rules: white text for dark bars, black for light.
      requestAnimationFrame(() => requestAnimationFrame(() => {
        window.dispatchEvent(new Event('resize'));
        if (numColColors.length) {
          const css = numColColors.map(({ col, textColor }) => {
            const sel = `.lu-c-${CSS.escape(col)},.lu-c-${CSS.escape(col.toLowerCase())}`;
            return `${sel} { color: ${textColor} !important; }\n` +
                   `${sel} *:not(svg):not(svg *) { color: ${textColor} !important; }`;
          }).join('\n');
          const style = document.createElement('style');
          style.textContent = css;
          wrap.appendChild(style);
        }
      }));
    },
    promptDescription: '- **lineup** — interactive ranking table that renders inline bar glyphs inside each cell and lets users sort/stack columns by weight. Best when comparing many entities across multiple numeric KPIs simultaneously. **Always use lazy SQL** — never inline data. Spec: { "type":"lineup", "title":"...", "columns":["name","revenue","cost"], "sql":"SELECT name, revenue, cost FROM ..." }',

  waterfall: {

  },
  rangebar: {
    render: renderApexCharts,
    promptDescription: '- **rangebar** — horizontal bar spanning a numeric range (min–max) per category. Best for price bands by category, salary ranges by job title, or any per-group spread comparison. Spec: { "type":"rangebar", "title":"...", "xLabel":"Price ($)", "data":[{"label":"Bikes","min":200,"max":3578},{"label":"Components","min":2,"max":1432}] }',
  },
  rangearea: {
    render: renderApexCharts,
    promptDescription: '- **rangearea** — shaded band between two values over a shared x-axis (time or ordered categories). Best for monthly min/max revenue bands, forecast confidence intervals, or price floor/ceiling trends. Spec: { "type":"rangearea", "title":"...", "xLabel":"Month", "yLabel":"Revenue ($)", "seriesLabel":"Revenue Range", "labels":["Jan","Feb","Mar"], "low":[80000,95000,72000], "high":[240000,275000,210000] }',
  },

  // ── Dynet3D ───────────────────────────────────────────────────────────────
  dynet3d: {
    render: renderDynet3D,
    promptDescription: '- **dynet3d** — 3D dynamic-network visualization. Each time step renders as a parallel 2D network plane stacked along the z-axis; same-id nodes are connected across slices to form entity timelines. Drag to orbit, scroll to zoom; "Reset to Front view" collapses to a single 2D network and "Side view" tilts to expose the time axis. Best for showing how a network evolves over time (users ↔ resources, hosts ↔ services, accounts ↔ products by month, attacker IPs ↔ victims by day). **Always use lazy SQL** for non-trivial datasets — return one row per (time, source, target) edge. Recognised columns: `time` (or `period`/`date`/`day`/`month`/`year`/`step`), `source` (or `src`/`from`/`user`/`src_ip`), `target` (or `destination`/`dst`/`to`/`job`/`dst_ip`), optional `value`/`count`, optional `category`/`type`/`attack_type` (for link color), optional `source_type`/`target_type` (controls node type → defaults coloring and the "Visualizing" filter dropdown). Spec (lazy SQL form): { "type":"dynet3d", "title":"...", "sql":"SELECT day::text AS time, src_ip AS source, dst_ip AS target, attack_type AS category, COUNT(*) AS value FROM events GROUP BY day, src_ip, dst_ip, attack_type ORDER BY day" }. Spec (inline form, only for very small examples): { "type":"dynet3d", "title":"...", "timeLabels":["Jan","Feb"], "nodes":[{"id":"u1","name":"Alice","type":"user","color":"#534AB7"}], "snapshots":[{"time":"Jan","links":[{"source":"u1","target":"r1","value":5}]}] }. `activeNodes` is optional (any node referenced by a link in a snapshot is implicitly active). Control panel lets the user toggle variations, timelines, users vs nodes, labels; switch straight/curved links; adjust link opacity, network expand (z-spacing), and time resolution (aggregation factor); and search by id/name.',
  },
};

// ── Chart plugin loader — fetches chart_plugins/*.json from the proxy ────────
// Each plugin file must have: { type, promptDescription, renderScript }
// renderScript is a JS function expression string:  "function(wrap, spec) { … }"
// Plugins are merged into chartRegistry so they work exactly like built-in types.
async function loadChartPlugins() {
  const base = API_PROXY_URL.replace('/messages', '');
  try {
    const res = await fetch(base + '/chart-plugins');
    if (!res.ok) return;
    const { plugins } = await res.json();
    let loaded = 0;
    for (const p of (plugins || [])) {
      if (!p.type || chartRegistry[p.type]) continue; // skip unknowns or collisions
      try {
        // eslint-disable-next-line no-new-func
        const renderFn = new Function('return (' + p.renderScript + ')')();
        if (typeof renderFn !== 'function') throw new Error('renderScript did not return a function');
        chartRegistry[p.type] = { render: renderFn, promptDescription: p.promptDescription };
        loaded++;
      } catch (e) {
        console.warn('[chart-plugin] Failed to load plugin "' + p.type + '":', e);
      }
    }
    if (loaded > 0) console.log('[chart-plugin] Loaded ' + loaded + ' plugin(s):', plugins.map(p => p.type).join(', '));
  } catch (_) {
    // Proxy not running or endpoint missing — fail silently, built-in types still work
  }
}

// ── Builds the Visualization section of the system prompt from the registry ─
function buildVisualizationPrompt() {
  const fence = '```';
  const typeList = Object.values(chartRegistry).map(e => e.promptDescription).join('\n');
  return '## Visualization Instructions\n' +
    'After retrieving data, present it visually using a ' + fence + 'chart block. Choose the chart type that best fits the data:\n' +
    typeList + '\n\n' +
    'Output format — always valid JSON inside the code fence:\n' +
    fence + 'chart\n' +
    '{ "type": "bar", "title": "Descriptive title here", "xLabel": "X axis label", "yLabel": "Y axis label", "labels": ["Label A", "Label B"], "datasets": [{ "label": "Series name", "data": [123, 456] }] }\n' +
    fence + '\n\n' +
    'Rules:\n' +
    '- If the user\'s request **leads with a visualization verb** (create, show, draw, plot, visualize, make, build, generate) and describes a chart or graph — even with detailed specs about colors, axes, or layout — output ONLY the chart block. The extra detail is the chart specification, not a request for explanation. No preamble, no bullet-point findings, no follow-up questions.\n' +
    '- Otherwise (analytical questions starting with "what", "why", "how", "which", "compare", or requests for insights/summaries), include a brief text explanation before or after the chart and offer 1-2 follow-up questions the user might want to explore next.\n' +
    '- Do NOT add a LIMIT clause to SQL queries unless the user explicitly requests one. Return all matching rows by default.\n' +
    '- Lazy data loading: for lineup, timearcs, timearcs-gl, graph, sankey, heatmap, box, violin, timeline, and swimlane charts — ALWAYS embed the SQL as `"sql":"SELECT..."` instead of an inline data array. The browser fetches all rows at render time. **Do NOT add a LIMIT clause** to lazy SQL specs. Use these standard column aliases: timearcs/timearcs-gl/graph/sankey → source, target, value, category; heatmap → x, y, value; box/violin → label, value; timeline → label, start, end, group; swimlane → time, actor, label, message, category (see swimlane prompt for full column list); lineup → exact column names from the SELECT list.\n' +
    '- For pricing analysis, use grouped bar (two datasets: List Price vs Avg Sale Price).\n' +
    '- Omit xLabel/yLabel for pie/doughnut/rose/funnel/sunburst/treemap charts.\n' +
    '- Round monetary values to 2 decimal places in the data array.';
}
