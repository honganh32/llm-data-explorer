// ── Lazy SQL chart support ───────────────────────────────────────────────────
// When a chart spec contains a "sql" field the browser fetches the rows itself
// via POST /query, then maps them into the chart-specific data shape.

function mergeRowsIntoSpec(spec, rows) {
  if (!rows.length) return spec;
  const s = Object.assign({}, spec);
  delete s.sql;
  // Pick the first defined value from a row using several candidate column names
  const pick = (row, ...names) => {
    for (const n of names) if (row[n] !== undefined && row[n] !== null) return row[n];
    return undefined;
  };
  const type = spec.type;
  if (type === 'timearcs' || type === 'timearcs-gl') {
    s.events = rows.map(r => ({
      year:     pick(r, 'year', 'Year', 'yr', 'time_bucket', 'bucket', 'period'),
      source:   pick(r, 'source', 'Source', 'src', 'source_ip'),
      target:   pick(r, 'target', 'Target', 'destination', 'Destination', 'dst', 'dest'),
      category: pick(r, 'category', 'Category', 'event_type', 'type', 'Type', 'attack_type', 'attack', 'label', 'event_class', 'class') || '',
      value:  +(pick(r, 'value', 'Value', 'count', 'Count', 'cnt', 'weight') ?? 1),
      label:    pick(r, 'label', 'Label') || '',
    }));
  } else if (type === 'graph') {
    const nodeIds = [...new Set(rows.flatMap(r => [
      pick(r, 'source', 'src'),
      pick(r, 'target', 'destination', 'dst', 'dest'),
    ].filter(Boolean)))];
    s.nodes = s.nodes || nodeIds.map(id => ({ id, name: id }));
    s.links = rows.map(r => ({
      source: pick(r, 'source', 'src'),
      target: pick(r, 'target', 'destination', 'dst', 'dest'),
      value:  +(pick(r, 'value', 'count', 'cnt', 'weight') ?? 1),
      label:  pick(r, 'label', 'category', 'event_type', 'type') || undefined,
      color:  pick(r, 'color') || undefined,
    }));
  } else if (type === 'sankey') {
    const nodes = [...new Set(rows.flatMap(r =>
      [pick(r, 'source', 'src'), pick(r, 'target', 'destination', 'dst')].filter(Boolean)
    ))];
    s.nodes = s.nodes || nodes;
    s.links = rows.map(r => ({
      source: pick(r, 'source', 'src'),
      target: pick(r, 'target', 'destination', 'dst'),
      value:  +(pick(r, 'value', 'count', 'cnt') ?? 1),
    }));
  } else if (type === 'heatmap') {
    const xs = s.xLabels || [...new Set(rows.map(r => pick(r, 'x', 'x_label', 'col', 'column')))];
    const ys = s.yLabels || [...new Set(rows.map(r => pick(r, 'y', 'y_label', 'row')))];
    s.xLabels = xs; s.yLabels = ys;
    s.data = rows.map(r => [
      xs.indexOf(pick(r, 'x', 'x_label', 'col', 'column')),
      ys.indexOf(pick(r, 'y', 'y_label', 'row')),
      +(pick(r, 'value', 'count', 'cnt') ?? 0),
    ]);
  } else if (type === 'bar' || type === 'line') {
    const hasSeries = rows.some(r => pick(r, 'series', 'group') !== undefined);
    const labels = [...new Set(rows.map(r => pick(r, 'label', 'name', 'x', 'category')))];
    s.labels = s.labels || labels;
    if (hasSeries) {
      const seriesVals = [...new Set(rows.map(r => pick(r, 'series', 'group')))];
      s.datasets = seriesVals.map(sv => ({
        label: sv,
        data: labels.map(lv => {
          const row = rows.find(r =>
            pick(r, 'label', 'name', 'x', 'category') === lv && pick(r, 'series', 'group') === sv
          );
          return row ? +(pick(row, 'value', 'count', 'y') ?? 0) : 0;
        }),
      }));
    } else {
      s.datasets = s.datasets || [{ label: s.yLabel || 'Value', data: rows.map(r => +(pick(r, 'value', 'count', 'y') ?? 0)) }];
    }
  } else if (['pie', 'doughnut', 'rose', 'funnel'].includes(type)) {
    s.data = rows.map(r => ({ name: pick(r, 'name', 'label', 'category', 'group') || '', value: +(pick(r, 'value', 'count', 'cnt') ?? 0) }));
  } else if (type === 'lineup') {
    s.data = rows;
    if (!s.columns) s.columns = rows.length ? Object.keys(rows[0]) : [];
  } else if (type === 'box' || type === 'violin') {
    const groups = new Map();
    rows.forEach(r => {
      const lbl = pick(r, 'label', 'name', 'category', 'group') || 'Value';
      const val = pick(r, 'value', 'y', 'amount', 'price', 'count', 'cnt');
      if (val != null) {
        if (!groups.has(lbl)) groups.set(lbl, []);
        groups.get(lbl).push(+val);
      }
    });
    s.data = Array.from(groups, ([label, values]) => ({ label, values }));
  } else if (type === 'timeline') {
    s.data = rows.map(r => ({
      label:    pick(r, 'label', 'name', 'task', 'id') || '',
      start:    pick(r, 'start', 'start_date', 'startdate', 'begin', 'orderdate') || '',
      end:      pick(r, 'end',   'end_date',   'enddate',   'finish', 'shipdate')  || '',
      group:    pick(r, 'group', 'category', 'status', 'phase') || 'Task',
    })).filter(d => d.start && d.end);
  } else if (type === 'crossset') {
    s.rows = rows.map(r => ({
      row_group: pick(r, 'row_group', 'rowGroup', 'rg') ?? '(none)',
      row_label: pick(r, 'row_label', 'rowLabel', 'rl') ?? '',
      col_group: pick(r, 'col_group', 'colGroup', 'cg') ?? '(none)',
      col_label: pick(r, 'col_label', 'colLabel', 'cl') ?? '',
      value:    +(pick(r, 'value', 'val', 'count', 'cnt') ?? 0),
    }));
  } else if (type === 'pad') {
    s.links = rows.map(r => ({
      src:   pick(r, 'src', 'source', 'customer', 'from', 'entity_a'),
      tgt:   pick(r, 'tgt', 'target', 'product', 'to', 'entity_b'),
      ts:    pick(r, 'ts', 'year', 'time', 'period', 'date'),
      value: +(pick(r, 'value', 'count', 'cnt', 'weight') ?? 1),
    }));
  } else if (type === 'timelighting') {
    s.events = rows.map(r => ({
      source:   pick(r, 'source', 'Source', 'src', 'from', 'entity_a'),
      target:   pick(r, 'target', 'Target', 'destination', 'dst', 'to', 'entity_b'),
      time:     pick(r, 'time', 'Time', 'year', 'Year', 'yr', 'period'),
      category: pick(r, 'category', 'Category', 'type', 'Type', 'event_type') || '',
      value:  +(pick(r, 'value', 'Value', 'count', 'Count', 'cnt', 'weight') ?? 1),
    }));
  } else if (type === 'dynet3d') {
    // Rows shape: { time, source, target, value?, category?/type?/label?, source_type?, target_type?, source_color?, target_color? }
    const timeSet = new Map();  // time -> insertion order
    const snapshotMap = new Map();  // time -> { activeNodes:Set, links:[] }
    const nodeMap = new Map();  // id -> { id, name, type?, color? }
    let order = 0;
    rows.forEach(r => {
      const time = String(pick(r, 'time', 'Time', 'period', 'date', 'day', 'month', 'year', 'yr', 'step', 't') ?? '');
      const src  = pick(r, 'source', 'Source', 'src', 'from', 'entity_a', 'user', 'user_id', 'src_ip');
      const tgt  = pick(r, 'target', 'Target', 'destination', 'dst', 'dest', 'to', 'entity_b', 'job', 'job_id', 'dst_ip');
      if (src == null || tgt == null) return;
      const sId = String(src), tId = String(tgt);
      if (!timeSet.has(time)) { timeSet.set(time, order++); snapshotMap.set(time, { activeNodes: new Set(), links: [] }); }
      const snap = snapshotMap.get(time);
      snap.activeNodes.add(sId);
      snap.activeNodes.add(tId);
      const linkType  = pick(r, 'category', 'Category', 'type', 'Type', 'event_type', 'attack_type', 'label');
      const linkColor = pick(r, 'color', 'link_color');
      const value = +(pick(r, 'value', 'Value', 'count', 'Count', 'cnt', 'weight') ?? 1);
      snap.links.push({
        source: sId, target: tId, value,
        ...(linkType  ? { type:  String(linkType)  } : {}),
        ...(linkColor ? { color: String(linkColor) } : {}),
      });
      if (!nodeMap.has(sId)) {
        const st = pick(r, 'source_type', 'src_type', 'srcType');
        const sc = pick(r, 'source_color', 'src_color');
        nodeMap.set(sId, { id: sId, name: pick(r, 'source_name') || sId, ...(st ? { type: String(st) } : {}), ...(sc ? { color: String(sc) } : {}) });
      }
      if (!nodeMap.has(tId)) {
        const tt = pick(r, 'target_type', 'dst_type', 'dest_type', 'tgtType');
        const tc = pick(r, 'target_color', 'dst_color');
        nodeMap.set(tId, { id: tId, name: pick(r, 'target_name') || tId, ...(tt ? { type: String(tt) } : {}), ...(tc ? { color: String(tc) } : {}) });
      }
    });
    // Sort times — try numeric, then date, then natural string
    const times = [...timeSet.keys()].sort((a, b) => {
      const na = +a, nb = +b;
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
      const da = Date.parse(a), db = Date.parse(b);
      if (!isNaN(da) && !isNaN(db)) return da - db;
      return a < b ? -1 : a > b ? 1 : 0;
    });
    s.nodes = s.nodes || [...nodeMap.values()];
    s.snapshots = times.map(t => {
      const snap = snapshotMap.get(t);
      return { time: t, activeNodes: [...snap.activeNodes], links: snap.links };
    });
    s.timeLabels = s.timeLabels || times;
  } else if (type === 'aardvark') {
    s.rows = rows.map(r => ({
      root:   String(pick(r, 'root', 'category', 'l1', 'group1') ?? '(root)'),
      branch: pick(r, 'branch', 'subcategory', 'l2', 'group2') != null
                ? String(pick(r, 'branch', 'subcategory', 'l2', 'group2'))
                : null,
      leaf:   String(pick(r, 'leaf', 'item', 'name', 'l3', 'group3') ?? '(leaf)'),
      period: String(pick(r, 'period', 'month', 'quarter', 'year', 'date', 'time') ?? ''),
      value:  +(pick(r, 'value', 'amount', 'revenue', 'count', 'cnt') ?? 0),
    }));
  } else if (type === 'swimlane') {
    s.rows = rows.map(r => ({
      time:     pick(r, 'time', 'Time', 'timestamp', 'event_time', 'when', 'date', 'datetime'),
      actor:    pick(r, 'actor', 'Actor', 'lane', 'role', 'agent_role', 'group', 'team', 'department'),
      label:    pick(r, 'label', 'Label', 'event', 'short_event', 'event_short', 'name', 'title') ?? '',
      message:  pick(r, 'message', 'Message', 'content', 'description', 'text', 'detail', 'body') ?? '',
      category: pick(r, 'category', 'Category', 'event_category', 'type', 'event_type', 'kind') ?? '',
      value:    +(pick(r, 'value', 'Value', 'weight', 'count', 'importance', 'cnt') ?? 1),
      event_id: pick(r, 'event_id', 'eventId', 'id'),
      cause_id: pick(r, 'cause_id', 'causeId', 'parent_id', 'prev_id', 'caused_by'),
    }));
  }
  return s;
}

async function resolveNdjson(spec, res, onProgress) {
  const rows = [];
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let done = false;
  while (!done) {
    const { done: streamDone, value } = await reader.read();
    if (streamDone) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();   // keep any incomplete trailing line
    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) continue;
      const obj = JSON.parse(trimmed);
      if (obj._error) throw new Error('Query error: ' + obj._error);
      if (obj._end) {
        if (obj.truncated && onProgress)
          onProgress(obj.row_count, true);
        done = true;
        break;
      }
      rows.push(obj);
      if (onProgress && rows.length % 10000 === 0) onProgress(rows.length, false);
    }
  }
  return mergeRowsIntoSpec(spec, rows);
}

async function resolveChartSpec(spec, onProgress) {
  if (!spec.sql) return spec;
  const base = API_PROXY_URL.replace('/messages', '');
  const res = await fetch(base + '/query', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sql: spec.sql, database: currentDatabase }),
  });
  if (!res.ok) throw new Error('Query fetch failed: HTTP ' + res.status);
  const ct = res.headers.get('Content-Type') || '';
  if (ct.includes('x-ndjson')) return resolveNdjson(spec, res, onProgress);
  // Fallback: old buffered JSON path (proxy without streaming support)
  const result = await res.json();
  if (result.error) throw new Error('Query error: ' + result.error);
  return mergeRowsIntoSpec(spec, result.rows || []);
}

// ── Chart initialiser — uses registry to dispatch to the right renderer ─────
function initCharts(container) {
  container.querySelectorAll('[data-chart]').forEach(el => {
    const rawSpec = JSON.parse(el.getAttribute('data-chart'));
    const frame = document.createElement('div');
    frame.className = 'chart-frame';
    const wrap = document.createElement('div');
    wrap.className = 'chart-wrap';
    frame.appendChild(wrap);
    el.replaceWith(frame);
    if (rawSpec.sql) {
      wrap.style.cssText = 'display:flex;align-items:center;justify-content:center;min-height:120px;';
      const loadDiv = document.createElement('div');
      loadDiv.className = 'chart-loading';
      const titleHtml = rawSpec.title ? `<div class="chart-loading-title">${escHtml(rawSpec.title)}</div>` : '';
      loadDiv.innerHTML = `<div class="chart-loading-spinner"></div>${titleHtml}<div class="chart-loading-status">Fetching data from database…</div><div class="chart-loading-rows"></div>`;
      wrap.appendChild(loadDiv);
    }
    (async () => {
      try {
        const onProgress = rawSpec.sql ? (n, truncated) => {
          const rowsEl = wrap.querySelector('.chart-loading-rows');
          const statusEl = wrap.querySelector('.chart-loading-status');
          if (rowsEl) rowsEl.textContent = n.toLocaleString() + (truncated ? ' rows (truncated)' : ' rows received');
          if (truncated && statusEl) statusEl.textContent = 'Add more aggregation to reduce data size';
        } : null;
        const spec = await resolveChartSpec(rawSpec, onProgress);
        if (spec.type === 'timearcs' && spec.events && spec.events.length > 5000) spec.type = 'timearcs-gl';
        const entry = chartRegistry[spec.type];
        if (!entry) throw new Error('Unknown chart type: "' + spec.type + '"');
        wrap.style.cssText = '';
        wrap.textContent = '';
        entry.render(wrap, spec);
        const anchor = document.createElement('div');
        anchor.className = 'chart-expand-anchor';
        const btn = document.createElement('button');
        btn.className = 'chart-expand-btn';
        btn.title = 'View enlarged';
        btn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M10 2h4v4M14 2l-6 6M6 14H2v-4M2 14l6-6"/></svg>';
        btn.onclick = () => openChartModal(spec);
        anchor.appendChild(btn);
        frame.insertBefore(anchor, frame.firstChild);
      } catch (e) {
        const errEl = document.createElement('pre');
        errEl.style.color = 'var(--danger-text)';
        errEl.textContent = 'Chart error: ' + String(e);
        frame.replaceWith(errEl);
      }
    })();
  });
}

async function openChartModal(spec) {
  const backdrop = document.getElementById('chartModalBackdrop');
  const body = document.getElementById('chartModalBody');
  document.getElementById('chartModalTitle').textContent = spec.title || '';
  body.querySelectorAll('*').forEach(el => {
    const ec = echarts.getInstanceByDom(el);
    if (ec) ec.dispose();
  });
  body.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.style.width = '100%';
  wrap.style.height = '100%';
  wrap.style.background = '#ffffff';
  body.appendChild(wrap);
  backdrop.classList.add('open');
  try {
    const resolved = await resolveChartSpec(spec);
    const entry = chartRegistry[resolved.type];
    if (entry) entry.render(wrap, resolved);
    requestAnimationFrame(() => {
      const ec = echarts.getInstanceByDom(wrap);
      if (ec) ec.resize();
    });
  } catch (e) {
    wrap.style.cssText = 'padding:20px;color:#888';
    wrap.textContent = 'Chart error: ' + e;
  }
}

function closeChartModal() {
  const body = document.getElementById('chartModalBody');
  body.querySelectorAll('*').forEach(el => {
    const ec = echarts.getInstanceByDom(el);
    if (ec) ec.dispose();
  });
  body.innerHTML = '';
  document.getElementById('chartModalBackdrop').classList.remove('open');
}

// Restore the most recent session on page load, or show the welcome message
(function initHistory() {
  const saved = getSessions();
  if (saved.length) {
    const last = saved[0];
    currentSessionId = last.id;
    last.messages.forEach(m => messages.push({ role: m.role, content: m.content, queries: m.queries || [] }));
    const msgsEl = document.getElementById('messages');
    msgsEl.innerHTML = '';
    for (const m of messages) {
      if (m.role === 'user') appendMessage('user', '<p>' + escHtml(m.content) + '</p>');
      else {
        const div = appendMessage('ai', formatResponse(m.content) + buildSqlToggleHtml(m.queries || []));
        initCharts(div);
      }
    }
  } else {
    renderWelcomeMessage();
  }
  renderHistoryList();
  loadDatabases();
  loadChartPlugins();
})();

if (window.location.protocol === 'file:') {
  appendMessage(
    'ai',
    '<div class="insight-card warn">This page is opened as a local file. Browser security blocks direct calls to Anthropic from here. Start the local proxy and keep this endpoint reachable: <code style="font-family:var(--mono);font-size:12px;background:var(--bg3);padding:1px 5px;border-radius:3px">' + API_PROXY_URL + '</code></div>'
  );
}

function toggleCols(el, id) {
  const cols = document.getElementById(id);
  cols.classList.toggle('open');
  el.classList.toggle('active');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendChip(el) {
  document.getElementById('input').value = el.textContent;
  sendMessage();
}

function appendMessage(role, html) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg' + (role === 'user' ? ' user' : '');
  const initials = role === 'user' ? 'You' : getDbInitials(currentDatabase);
  div.innerHTML = '<div class="avatar ' + role + '">' + initials + '</div><div class="bubble ' + role + '">' + html + '</div>';
  msgs.appendChild(div);
  const bubble = div.querySelector('.bubble');
  if (bubble) initCharts(bubble);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function formatResponse(text) {
  let html = text;

  // 1. Extract ```chart blocks → placeholder divs with data-chart attribute
  const chartBlocks = [];
  html = html.replace(/```chart\s*([\s\S]*?)```/gi, (_, raw) => {
    const idx = chartBlocks.length;
    try {
      JSON.parse(raw.trim()); // validate JSON
      chartBlocks.push(raw.trim());
      return '%%CHART' + idx + '%%';
    } catch (e) {
      return '<pre>' + escHtml(raw.trim()) + '</pre>';
    }
  });

  // 2. Extract ```sql blocks
  const sqlBlocks = [];
  html = html.replace(/```sql([\s\S]*?)```/gi, (_, code) => {
    const idx = sqlBlocks.length;
    sqlBlocks.push('<pre>' + escHtml(code.trim()) + '</pre>');
    return '%%SQL' + idx + '%%';
  });

  // 3. Remaining fenced code blocks
  html = html.replace(/```[\w]*([\s\S]*?)```/g, (_, code) => '<pre>' + escHtml(code.trim()) + '</pre>');

  // 4. Inline markdown
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
  html = html.replace(/`([^`]+)`/g, '<code style="font-family:var(--mono);font-size:12px;background:var(--bg3);padding:1px 5px;border-radius:3px">$1</code>');

  // 4b. Markdown tables → HTML tables
  html = html.replace(/((?:[ \t]*\|[^\n]+\n){2,}[ \t]*\|[^\n]+)/g, (match) => {
    const rows = match.trim().split('\n').map(l => l.trim()).filter(l => l);
    if (rows.length < 2) return match;
    if (!/^\|[-|: ]+\|$/.test(rows[1])) return match;
    const parseRow = l => l.split('|').slice(1, -1).map(c => c.trim());
    const headers = parseRow(rows[0]);
    const dataRows = rows.slice(2).map(parseRow);
    let t = '<table><thead><tr>' + headers.map(h => '<th>' + h + '</th>').join('') + '</tr></thead><tbody>';
    dataRows.forEach(r => { t += '<tr>' + r.map(c => '<td>' + c + '</td>').join('') + '</tr>'; });
    return t + '</tbody></table>';
  });

  // 5. Lines → paragraphs / lists / headings
  const lines = html.split('\n');
  let out = '', inList = false;
  for (const line of lines) {
    if (line.startsWith('- ') || line.startsWith('* ')) {
      if (!inList) { out += '<ul style="margin:6px 0 6px 16px;list-style:disc">'; inList = true; }
      out += '<li style="margin:2px 0">' + line.slice(2) + '</li>';
    } else {
      if (inList) { out += '</ul>'; inList = false; }
      const t = line.trim();
      if (t.startsWith('### ')) out += '<p style="font-weight:600;font-size:13px;margin:10px 0 3px;color:var(--text2)">' + t.replace(/^###\s*/, '') + '</p>';
      else if (t.startsWith('## ')) out += '<p style="font-weight:500;font-size:14px;margin:12px 0 4px">' + t.replace(/^##\s*/, '') + '</p>';
      else if (t.startsWith('# '))  out += '<p style="font-weight:600;font-size:15px;margin:14px 0 5px">' + t.replace(/^#\s*/, '') + '</p>';
      else if (t.startsWith('<table') || t.startsWith('<pre') || t.startsWith('<div') || t.startsWith('%%')) out += t;
      else if (t) out += '<p>' + t + '</p>';
    }
  }
  if (inList) out += '</ul>';

  // 6. Restore SQL blocks
  sqlBlocks.forEach((blk, i) => { out = out.replace('%%SQL' + i + '%%', blk); });

  // 7. Restore chart blocks as placeholder divs (rendered after DOM insertion)
  chartBlocks.forEach((spec, i) => {
    const safeSpec = spec.replace(/"/g, '&quot;');
    out = out.replace(
      '%%CHART' + i + '%%',
      '<div data-chart="' + safeSpec + '"></div>'
    );
  });

  return out;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildSqlToggleHtml(queries) {
  if (!queries || queries.length === 0) return '';
  const countLabel = queries.length === 1 ? '1 query' : `${queries.length} queries`;
  const blocks = queries.map(q => {
    const meta = [q.description, typeof q.row_count === 'number' ? `${q.row_count} rows returned` : '']
      .filter(Boolean).join(' · ');
    return `<div class="sql-query-block">${meta ? `<div class="sql-query-meta">${escHtml(meta)}</div>` : ''}<pre>${escHtml(q.sql)}</pre></div>`;
  }).join('');
  return `<div class="sql-toggle">
    <button onclick="this.closest('.sql-toggle').classList.toggle('open')">
      <svg viewBox="0 0 16 16"><path d="M3 4h10M3 8h7M3 12h5"/></svg>
      SQL used &mdash; ${escHtml(countLabel)}
      <svg class="sql-chevron" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4"/></svg>
    </button>
    <div class="sql-panel">${blocks}</div>
  </div>`;
}

// ── Chat history (localStorage) ─────────────────────────────────────────────
const SESSIONS_KEY = 'aw_chat_sessions';
let currentSessionId = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

function getSessions() {
  try { return JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'); } catch { return []; }
}

function setSessions(s) {
  try { localStorage.setItem(SESSIONS_KEY, JSON.stringify(s)); } catch {}
}

function saveCurrentSession() {
  const userMsgs = messages.filter(m => m.role === 'user');
  if (!userMsgs.length) return;
  const title = userMsgs[0].content.slice(0, 60) + (userMsgs[0].content.length > 60 ? '…' : '');
  const sessions = getSessions();
  const idx = sessions.findIndex(s => s.id === currentSessionId);
  const session = { id: currentSessionId, title, updatedAt: new Date().toISOString(), messages: messages.map(m => ({ role: m.role, content: m.content, queries: m.queries || [] })) };
  if (idx >= 0) sessions[idx] = session; else sessions.unshift(session);
  setSessions(sessions);
  renderHistoryList();
}

function loadSession(id) {
  if (id === currentSessionId) return;
  saveCurrentSession();
  const session = getSessions().find(s => s.id === id);
  if (!session) return;
  currentSessionId = id;
  messages.length = 0;
  session.messages.forEach(m => messages.push({ role: m.role, content: m.content, queries: m.queries || [] }));
  const msgsEl = document.getElementById('messages');
  msgsEl.innerHTML = '';
  for (const m of messages) {
    if (m.role === 'user') appendMessage('user', '<p>' + escHtml(m.content) + '</p>');
    else {
      const div = appendMessage('ai', formatResponse(m.content) + buildSqlToggleHtml(m.queries || []));
      initCharts(div);
    }
  }
  renderHistoryList();
}

function newChat() {
  saveCurrentSession();
  currentSessionId = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  messages.length = 0;
  document.getElementById('messages').innerHTML = '';
  renderWelcomeMessage();
  renderHistoryList();
  document.getElementById('input').focus();
}

function deleteSession(id, event) {
  event.stopPropagation();
  const sessions = getSessions().filter(s => s.id !== id);
  setSessions(sessions);
  if (id === currentSessionId) newChat(); else renderHistoryList();
}

function renderHistoryList() {
  const list = document.getElementById('history-list');
  if (!list) return;
  const sessions = getSessions();
  if (!sessions.length) {
    list.innerHTML = '<div class="history-empty">No saved chats yet.<br>Start a conversation to save it here.</div>';
    return;
  }
  list.innerHTML = sessions.map(s => {
    const active = s.id === currentSessionId ? ' active' : '';
    const date = relativeDate(s.updatedAt);
    return `<div class="history-item${active}" onclick="loadSession('${s.id}')">
      <div class="history-title">${escHtml(s.title)}</div>
      <div class="history-meta">
        <span class="history-date">${date}</span>
        <button class="history-del" onclick="deleteSession('${s.id}',event)" title="Delete">×</button>
      </div>
    </div>`;
  }).join('');
}

function relativeDate(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function renderWelcomeMessage() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  const initials = getDbInitials(currentDatabase);
  const isAW = currentDatabase === 'AdventureWorks2019';
  if (isAW) {
    div.innerHTML = `<div class="avatar ai">${initials}</div><div class="bubble ai">
      <p>Hi! I'm your AdventureWorks data assistant. I have full knowledge of the database schema — including Sales, Production, HR, and Person tables — so you can ask me anything without setting up a prompt.</p>
      <p>Try one of these to get started:</p>
      <div class="chip-row">
        <span class="chip" onclick="sendChip(this)">Which items could be priced higher?</span>
        <span class="chip" onclick="sendChip(this)">Top 10 products by revenue last year</span>
        <span class="chip" onclick="sendChip(this)">Which territories are underperforming?</span>
        <span class="chip" onclick="sendChip(this)">Customers with highest lifetime value</span>
        <span class="chip" onclick="sendChip(this)">Products selling below cost</span>
        <span class="chip" onclick="sendChip(this)">Average discount by product category</span>
      </div>
    </div>`;
  } else {
    div.innerHTML = `<div class="avatar ai">${initials}</div><div class="bubble ai">
      <p>Hi! I'm connected to the <strong>${escHtml(currentDatabase)}</strong> database. I'll explore the schema automatically when you ask your first question.</p>
      <p>Try one of these to get started:</p>
      <div class="chip-row">
        <span class="chip" onclick="sendChip(this)">What tables are in this database?</span>
        <span class="chip" onclick="sendChip(this)">Show me a summary of the data</span>
        <span class="chip" onclick="sendChip(this)">What are the most recent records?</span>
        <span class="chip" onclick="sendChip(this)">How many rows are in each table?</span>
      </div>
    </div>`;
  }
  msgs.appendChild(div);
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  appendMessage('user', '<p>' + escHtml(text) + '</p>');
  messages.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  const typingDiv = appendMessage('ai', '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>');

  try {
    const res = await fetch(API_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 10000,
        database: currentDatabase,
        // System as array enables Anthropic prompt caching — the large schema block
        // is cached after the first request and not re-billed for ~5 min.
        system: [{ type: 'text', text: getSystemPromptText(), cache_control: { type: 'ephemeral' } }],
        messages: messages.slice(-10).map(m => ({ role: m.role, content: m.content }))
      })
    });

    if (!res.ok) {
      let errMsg = 'HTTP ' + res.status;
      try {
        const errJson = await res.json();
        errMsg = errJson.error?.message || errJson.error || errMsg;
      } catch (_) {
        const errText = await res.text();
        if (errText) errMsg = errText;
      }
      throw new Error(errMsg);
    }

    const data = await res.json();
    const textBlocks = (data.content || []).filter(b => b.type === 'text' && b.text);
    const reply = textBlocks.map(b => b.text).join('') ||
      '[No text in response — stop_reason: ' + (data.stop_reason || 'unknown') + ']';
    const queries = data._meta?.queries || [];
    messages.push({ role: 'assistant', content: reply, queries });
    saveCurrentSession();
    const bubble = typingDiv.querySelector('.bubble');

    // Render query trace badges if the proxy reported tool calls
    let traceHtml = '';
    for (const q of queries) {
      const label = q.description || (q.sql.length > 60 ? q.sql.slice(0, 60) + '…' : q.sql);
      const rows = typeof q.row_count === 'number' ? ` · ${q.row_count} rows` : '';
      traceHtml += `<div class="tool-call">
        <svg viewBox="0 0 16 16"><path d="M3 4h10M3 8h7M3 12h5"/></svg>
        <span>${escHtml(label)}</span>
        <span style="margin-left:auto;opacity:0.6">${rows}</span>
      </div>`;
    }

    bubble.innerHTML = traceHtml + formatResponse(reply) + buildSqlToggleHtml(queries);
    initCharts(bubble);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  } catch (e) {
    const msg = e && e.message ? escHtml(e.message) : 'Unknown error';
    const bubble = typingDiv && typingDiv.querySelector('.bubble');
    if (bubble) {
      bubble.innerHTML =
        '<p style="color:var(--danger-text)"><strong>Error:</strong> ' + msg + '</p>' +
        '<p style="color:var(--text2);font-size:13px;margin-top:6px">' +
        'Check the proxy terminal for details — it\'s running at ' +
        '<code style="font-family:var(--mono);font-size:12px;background:var(--bg3);padding:1px 5px;border-radius:3px">' + API_PROXY_URL + '</code>. ' +
        'Health check: <a href="' + API_PROXY_URL.replace('/messages', '/health') + '" target="_blank" ' +
        'style="color:var(--accent)">' + API_PROXY_URL.replace('/messages', '/health') + '</a></p>';
    }
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('input').focus();
}
</script>
